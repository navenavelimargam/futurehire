<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Gateway Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .stats-box { border: 1px solid #dee2e6; padding: 20px; border-radius: 8px; background: white; margin-bottom: 20px; }
        .log-table { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        .chart-container { position: relative; height: 300px; width: 100%; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h2 class="mb-4">Live Traffic Monitor</h2>
        
        <div class="row">
            <div class="col-md-3">
                <div class="stats-box">
                    <h5>Total Requests</h5>
                    <h2 id="total-req">0</h2>
                </div>
                <div class="stats-box">
                    <h5>Requests Per Second</h5>
                    <h2 id="rps-val">0.0</h2>
                </div>
                <div class="stats-box">
                    <h5>IP Management</h5>
                    <div class="input-group mb-3">
                        <input type="text" id="ip-input" class="form-control" placeholder="IP Address">
                        <button class="btn btn-danger" onclick="addBlock()">Block</button>
                    </div>
                    <hr>
                    <h6>Blacklisted IPs:</h6>
                    <div id="blacklist-ips"></div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="row">
                    <div class="col-md-12">
                        <div class="stats-box">
                            <h5>Network Activity (Radar)</h5>
                            <div class="chart-container">
                                <canvas id="radarChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="log-table">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>IP Address</th>
                                <th>Endpoint</th>
                                <th>Method</th>
                                <th>Status</th>
                                <th>Reason</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="log-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
